name: Build G Count APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
    - uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0'
        channel: 'stable'
    - run: flutter pub get
    - run: flutter build apk --release
    - run: mkdir -p bin && cp build/app/outputs/flutter-apk/app-release.apk bin/g-count-release.apk
    - uses: actions/upload-artifact@v4
      with:
        name: g-count-release
        path: bin/g-count-release.apk
    - uses: softprops/action-gh-release@v1
      if: github.ref == 'refs/heads/main'
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: G Count v1.0.${{ github.run_number }}
        files: bin/g-count-release.apk
        token: ${{ secrets.GITHUB_TOKEN }}
